<!DOCTYPE html>
<html>

<head>

    <title>Home</title>

    <script>

        let folders = [];

        function createFolder() {

            let folderName = prompt("Enter Folder Name");

            if (folderName == null)
                return;

            folderName = folderName.trim();

            if (folderName == "") {
                alert("Folder name cannot be empty");
                return;
            }

            if (folders.includes(folderName)) {
                alert("Folder name already exists");
                return;
            }

            folders.push(folderName);

            displayFolders();

        }

        function deleteFolder(folderName) {

            let confirmDelete = confirm("Delete " + folderName + " ?");

            if (!confirmDelete)
                return;

            folders = folders.filter(f => f != folderName);

            displayFolders();

        }

        function openFolder(folderName) {

            localStorage.setItem("selectedFolder", folderName);

            window.location.href = "folder.html";

        }

        function displayFolders() {

            let container = document.getElementById("folderContainer");

            container.innerHTML = "";

            for (let i = 0; i < folders.length; i++) {

                let row = document.createElement("div");

                row.style.display = "flex";
                row.style.justifyContent = "space-between";
                row.style.alignItems = "center";
                row.style.width = "400px";
                row.style.margin = "10px auto";
                row.style.padding = "10px";
                row.style.background = "white";
                row.style.borderRadius = "8px";
                row.style.boxShadow = "0 0 8px lightgray";

                let folderButton = document.createElement("button");

                folderButton.innerHTML = "📁 " + folders[i];

                folderButton.style.border = "none";
                folderButton.style.background = "white";
                folderButton.style.cursor = "pointer";
                folderButton.style.fontSize = "16px";

                folderButton.onclick = function () {
                    openFolder(folders[i]);
                };

                let deleteButton = document.createElement("button");

                deleteButton.innerHTML = "Delete";

                deleteButton.style.background = "#ff4d4d";
                deleteButton.style.color = "white";
                deleteButton.style.border = "none";
                deleteButton.style.padding = "8px";
                deleteButton.style.borderRadius = "5px";
                deleteButton.style.cursor = "pointer";

                deleteButton.onclick = function () {
                    deleteFolder(folders[i]);
                };

                row.appendChild(folderButton);
                row.appendChild(deleteButton);

                container.appendChild(row);

            }

        }

    </script>

</head>

<body style="margin:0;
background:#F0F8FF;
font-family:Arial;">

    <div style="text-align:center;padding-top:40px;">

        <h1>🏠 Home</h1>

        <button onclick="createFolder()"
            style="padding:10px 20px;
                   background:#4CAF50;
                   color:white;
                   border:none;
                   border-radius:5px;
                   cursor:pointer;">

            + Create Folder

        </button>

        <br><br>

        <div id="folderContainer">

        </div>

    </div>

</body>

</html>
